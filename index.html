<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --pink-primary: #ffafcc;
            --pink-dark: #fb6f92;
            --cream: #fff0f3;
            --white: #ffffff;
            --shadow: rgba(251, 111, 146, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--cream);
            color: #444;
            overflow-x: hidden;
        }

        /* Fondo de Kirby flotante */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://www.transparentpng.com/download/kirby/Y7nK8v-kirby-cute-transparent.png') no-repeat;
            background-size: 200px;
            background-position: bottom right;
            opacity: 0.1;
            z-index: -1;
            pointer-events: none;
        }

        header {
            background: var(--white);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px var(--shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--pink-dark);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        nav a {
            text-decoration: none;
            color: var(--pink-dark);
            margin-left: 20px;
            font-weight: 600;
            transition: 0.3s;
        }

        nav a:hover {
            color: #ff8fab;
        }

      
        .hero {
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(rgba(255, 175, 204, 0.4), rgba(255, 255, 255, 0.4)), 
                        url('https://images.unsplash.com/photo-1509440159596-0249088772ff?ixlib=rb-4.0.3&auto=format&fit=crop&w=1472&q=80');
            background-size: cover;
            background-position: center;
            color: var(--white);
        }

        .hero-content {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            padding: 3rem;
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px var(--shadow);
        }

        .hero h1 {
            font-size: 4rem;
            text-shadow: 2px 2px 10px var(--pink-dark);
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 1.5rem;
            color: var(--pink-dark);
            font-weight: bold;
            background: white;
            display: inline-block;
            padding: 5px 20px;
            border-radius: 50px;
        }

        /* Productos */
        .section {
            padding: 5rem 10%;
            text-align: center;
        }

        .section h2 {
            color: var(--pink-dark);
            font-size: 2.5rem;
            margin-bottom: 3rem;
            position: relative;
        }

        .section h2::after {
            content: '⭐';
            position: absolute;
            font-size: 1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--white);
            padding: 1.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 20px var(--shadow);
            transition: transform 0.3s;
            border: 2px solid transparent;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--pink-primary);
        }

        .card img {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 1rem;
        }

        .card h3 {
            color: var(--pink-dark);
            margin-bottom: 10px;
        }

        /* Social Media */
        .social-links {
            background: var(--pink-primary);
            padding: 3rem;
            text-align: center;
            color: white;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }

        .social-icons a {
            color: white;
            font-size: 2.5rem;
            transition: 0.3s;
        }

        .social-icons a:hover {
            color: var(--pink-dark);
            transform: scale(1.2);
        }

        footer {
            background: var(--pink-dark);
            color: white;
            text-align: center;
            padding: 1rem;
        }

        /* Botón Flotante de Kirby (Volver arriba) */
        .btn-kirby {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #ffc8dd;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            cursor: pointer;
            border: 3px solid white;
        }

    </style>
</head>
<body>

    <header>
        <div class="logo">
            <i class="fas fa-bread-slice"></i>Pan Otaku 
        </div>
        <nav>
            <a href="#">Inicio</a>
            <a href="#menu">Menú</a>
            <a href="#social">Redes</a>
            <a href="#">Contacto</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1></h1>
            <p></p>
        </div>
    </section>

    <section class="section" id="menu">
        <h2>Nuestras Especialidades</h2>
        <div class="grid">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1558961363-fa8fdf82db35?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=60" alt="Galletas">
                <h3></h3>
                <p></p>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1551024506-0bccd828d307?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=60" alt="Donas">
                <h3></h3>
                <p></p>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=60" alt="Pastel">
                <h3></h3>
                <p></p>
            </div>
        </div>
    </section>

    <section class="social-links" id="social">
        <h2>¡Síguenos en nuestras redes!</h2>
        <p>Entérate de los nuevos lanzamientos y dinámicas.</p>
        <div class="social-icons">
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-facebook"></i></a>
            <a href="#"><i class="fab fa-tiktok"></i></a>
            <a href="#"><i class="fab fa-whatsapp"></i></a>
        </div>
    </section>

    <footer>
    </footer>

  

</body>
</html>
